<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <!-- Scimitar Shape -->
    <g id="scimitar">
      <!-- Curved Blade -->
      <path d="M0 -26 Q 14 -12 4 8 L -4 8 Q -2 -8 0 -26 Z" fill="#ffffff" />
      <!-- Guard -->
      <path d="M-8 8 L8 8" stroke="#d4af37" stroke-width="2" stroke-linecap="round" />
      <path d="M-6 11 L6 11" stroke="#e2c290" stroke-width="1" />
      <!-- Handle -->
      <rect x="-2" y="10" width="4" height="10" fill="#17212b" />
      <!-- Pommel -->
      <circle cx="0" cy="22" r="3" fill="#d4af37" />
    </g>
  </defs>

  <!-- Action Sweep Lines -->
  <path d="M 12 16 Q 32 -4 52 16" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="6 4" />
  
  <!-- Crossed Scimitars -->
  <g transform="translate(32, 34)">
    <g transform="rotate(45)">
      <use href="#scimitar" />
    </g>
    <g transform="rotate(-45)">
      <use href="#scimitar" />
    </g>
  </g>

  <!-- Action/Impact Highlight Center -->
  <g transform="translate(32, 28)">
    <path d="M0 -8 L-2 -3 L-7 -5 L-4 0 L-7 5 L-2 3 L0 8 L2 3 L7 5 L4 0 L7 -5 L2 -3 Z" fill="#d4af37" opacity="0.9"/>
  </g>
  
  <!-- Speed Lines / Dust trails for motion -->
  <path d="M8 52 L20 48 M56 52 L44 48" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6" />
  <path d="M16 58 L28 56 M48 58 L36 56" stroke="#e2c290" stroke-width="1" stroke-linecap="round" opacity="0.4" />
</svg>
