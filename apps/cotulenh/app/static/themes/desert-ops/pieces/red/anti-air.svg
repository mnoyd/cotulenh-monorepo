<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" />
    </filter>
  </defs>
  <ellipse cx="50" cy="85" rx="42" ry="8" fill="#1a1a1a" opacity="0.6" />
  <g filter="url(#shadow)">
    <!-- Truck Chassis (Bavar-373 TELAR vibe) -->
    <rect x="15" y="60" width="70" height="15" fill="#c75b39" stroke="#8a3a1e" stroke-width="1.5" rx="2" />
    <circle cx="22" cy="75" r="5" fill="#2c2a26" />
    <circle cx="36" cy="75" r="5" fill="#2c2a26" />
    <circle cx="64" cy="75" r="5" fill="#2c2a26" />
    <circle cx="78" cy="75" r="5" fill="#2c2a26" />
    <!-- Cab -->
    <rect x="65" y="45" width="20" height="15" fill="#c75b39" stroke="#8a3a1e" stroke-width="1.5" rx="2" />
    <rect x="68" y="48" width="5" height="5" fill="#1a1a1a" />
    <!-- Vertical Launch Tubes -->
    <rect x="25" y="25" width="25" height="35" fill="#d4845a" stroke="#8a3a1e" stroke-width="1.5" rx="2" />
    <rect x="28" y="25" width="5" height="35" fill="#c75b39" />
    <rect x="35" y="25" width="5" height="35" fill="#c75b39" />
    <rect x="42" y="25" width="5" height="35" fill="#c75b39" />
    <!-- Radar Array on top -->
    <path d="M 22 20 L 53 20 L 48 25 L 27 25 Z" fill="#7a3d1a" stroke="#8a3a1e" stroke-width="1" />
  </g>
</svg>