<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)" />
    </filter>
  </defs>
  <!-- engineer / red High Detail Modern Warfare -->
  <g filter="url(#drop-shadow)">
    
    <g>
      <!-- Armored Engineering Vehicle (AEV) -->
      <!-- Heavy Track system -->
      <path d="M 12 75 A 10 10 0 0 0 22 85 L 75 85 A 10 10 0 0 0 85 75 Z" fill="#4a5d23" />
      <!-- Lots of wheels for heavy load -->
      <circle cx="20" cy="79" r="4" fill="#2e3b18" />
      <circle cx="30" cy="79" r="4" fill="#2e3b18" />
      <circle cx="40" cy="79" r="4" fill="#2e3b18" />
      <circle cx="50" cy="79" r="4" fill="#2e3b18" />
      <circle cx="60" cy="79" r="4" fill="#2e3b18" />
      <circle cx="70" cy="79" r="4" fill="#2e3b18" />
      <circle cx="80" cy="79" r="4" fill="#2e3b18" />

      <!-- Hull (Boxy, utilitarian) -->
      <polygon points="12,50 20,40 70,40 85,55 85,75 12,75" fill="#6b8e23" stroke="#2e3b18" stroke-width="1.5" />

      <!-- Massive Dozer Blade (Front) -->
      <path d="M 85 45 C 95 45, 95 85, 80 85" fill="none" stroke="#4a5d23" stroke-width="6" stroke-linecap="round" />
      <polygon points="85,60 70,70 80,80" fill="#2e3b18" /> <!-- Hydraulic arm -->

      <!-- Telescopic Crane / Excavator Arm (Stowed on top) -->
      <rect x="25" y="32" width="40" height="8" rx="2" fill="#4a5d23" /> <!-- Main boom -->
      <rect x="60" y="34" width="20" height="4" fill="#6b8e23" /> <!-- Extension -->
      <polygon points="80,33 85,36 80,39" fill="#2e3b18" /> <!-- Hook/Claw base -->
      <!-- Warning Hazard Stripes on the crane -->
      <polygon points="30,32 35,32 30,40 25,40" fill="#ff4500" />
      <polygon points="40,32 45,32 40,40 35,40" fill="#ff4500" />
      <polygon points="50,32 55,32 50,40 45,40" fill="#ff4500" />

      <!-- Winch & Spool -->
      <circle cx="35" cy="50" r="6" fill="#2e3b18" stroke="#4a5d23" stroke-width="2" />
      <circle cx="35" cy="50" r="3" fill="#6b8e23" />

      <!-- Engineering Tools / Gear strapped to side -->
      <rect x="45" y="50" width="15" height="5" fill="#2e3b18" rx="2" />
      <path d="M 50 50 L 55 55" stroke="#6b8e23" stroke-width="1" />
    </g>
  
  </g>
</svg>