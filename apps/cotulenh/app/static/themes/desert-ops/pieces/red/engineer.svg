<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" />
    </filter>
  </defs>
  <ellipse cx="50" cy="90" rx="35" ry="5" fill="#1a1a1a" opacity="0.6" />
  <g filter="url(#shadow)">
    <!-- Backpack (Explosives/Gear) -->
    <path d="M 25 50 L 35 50 L 35 85 L 20 85 Z" fill="#5e2b2b" stroke="#3d1d1d" stroke-width="1.5" />
    <rect x="22" y="55" width="8" height="20" fill="#3d1d1d" rx="2" />
    <!-- Body -->
    <path d="M 35 90 C 35 60, 40 55, 50 55 C 60 55, 65 60, 65 90 Z" fill="#8c3a3a" stroke="#5e2b2b" stroke-width="1.5" />
    <!-- Vest/Plate Carrier -->
    <path d="M 40 90 L 42 65 L 58 65 L 60 90 Z" fill="#b35050" stroke="#5e2b2b" stroke-width="1" />
    <!-- Head/Helmet -->
    <path d="M 38 45 C 38 25, 62 25, 62 45 C 62 55, 58 58, 50 58 C 42 58, 38 55, 38 45 Z" fill="#b35050" stroke="#2c2a26" stroke-width="1.5" />
    <!-- Distinctive Helmet / Wrap -->
    <path d="M 34 38 C 34 20, 66 20, 66 38 Q 50 40 34 38 Z" fill="#4f5445" stroke="#3d4a35" stroke-width="1.5" />
    <path d="M 35 48 Q 50 50 65 48" fill="none" stroke="#2c2a26" stroke-width="2" opacity="0.5" />
    <!-- Shovel (Entrenching Tool) -->
    <g transform="translate(55, 60) rotate(20)">
      <rect x="0" y="0" width="4" height="30" fill="#6b4423" /> <!-- Wooden handle -->
      <path d="M -5 25 L 9 25 L 5 40 L -1 40 Z" fill="#2c2a26" /> <!-- Blade -->
      <rect x="-2" y="-2" width="8" height="3" fill="#2c2a26" /> <!-- Top handle base -->
      <rect x="-2" y="-5" width="8" height="3" fill="none" stroke="#2c2a26" stroke-width="2" />
    </g>
  </g>
</svg>