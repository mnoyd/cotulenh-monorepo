<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)" />
    </filter>
  </defs>
  <!-- infantry / red High Detail Modern Warfare -->
  <g filter="url(#drop-shadow)">
    
    <g>
      <!-- Base Shadow / Posture -->
      <ellipse cx="50" cy="85" rx="30" ry="6" fill="#2e3b18" opacity="0.4" />

      <!-- Legs (Crouching / Tactical Stance) -->
      <path d="M 45 60 L 40 85 L 35 85 L 40 60 Z" fill="#4a5d23" />
      <path d="M 55 60 L 65 85 L 70 85 L 60 60 Z" fill="#4a5d23" />
      <path d="M 40 70 L 65 70" stroke="#2e3b18" stroke-width="2" /> <!-- Knee pad line -->

      <!-- Torso & Tactical Vest (Plate Carrier) -->
      <polygon points="42,35 58,35 60,60 40,60" fill="#6b8e23" stroke="#2e3b18" stroke-width="1.5" />
      <rect x="44" y="40" width="12" height="15" fill="#2e3b18" rx="2" /> <!-- Armor plate -->
      <rect x="44" y="40" width="12" height="4" fill="#ff4500" opacity="0.6" /> <!-- Pouch -->
      <rect x="44" y="45" width="12" height="4" fill="#ff4500" opacity="0.6" /> <!-- Pouch -->

      <!-- Arms holding rifle -->
      <path d="M 42 40 L 30 55 L 45 55" fill="none" stroke="#4a5d23" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 58 40 L 65 50 L 55 52" fill="none" stroke="#4a5d23" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />

      <!-- Weapon: Assault Rifle (M4 / HK416 style) -->
      <rect x="40" y="50" width="40" height="4" fill="#2e3b18" /> <!-- Barrel/Handguard -->
      <rect x="45" y="48" width="10" height="4" fill="#4a5d23" /> <!-- Receiver -->
      <rect x="52" y="46" width="6" height="2" fill="#ff4500" /> <!-- Optic -->
      <rect x="48" y="54" width="3" height="10" fill="#4a5d23" /> <!-- Magazine -->
      <polygon points="40,50 32,54 32,58 40,54" fill="#2e3b18" /> <!-- Stock -->

      <!-- Head & Advanced Helmet -->
      <circle cx="50" cy="25" r="9" fill="#6b8e23" /> <!-- Face / Balaclava -->
      <path d="M 40 25 C 40 10, 60 10, 60 25 Z" fill="#4a5d23" /> <!-- Helmet Shell -->
      <path d="M 38 23 C 45 28, 55 28, 62 23 C 60 30, 40 30, 38 23 Z" fill="#2e3b18" /> <!-- Goggles/Visor -->
      <circle cx="48" cy="18" r="2" fill="#ff4500" /> <!-- Night Vision mount point -->
      <!-- Comms headset -->
      <rect x="42" y="20" width="4" height="8" fill="#2e3b18" rx="2" transform="rotate(-15 42 20)" />
      <rect x="54" y="20" width="4" height="8" fill="#2e3b18" rx="2" transform="rotate(15 54 20)" />
    </g>
  
  </g>
</svg>