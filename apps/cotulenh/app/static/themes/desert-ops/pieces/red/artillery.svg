<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)" />
    </filter>
  </defs>
  <!-- artillery / red High Detail Modern Warfare -->
  <g filter="url(#drop-shadow)">
    
    <g>
      <!-- Tracks & Wheels (Heavier Chassis) -->
      <path d="M 15 70 A 10 10 0 0 0 25 80 L 70 80 A 10 10 0 0 0 80 70 Z" fill="#4a5d23" />
      <circle cx="23" cy="74" r="4" fill="#2e3b18" />
      <circle cx="35" cy="74" r="4" fill="#2e3b18" />
      <circle cx="47" cy="74" r="4" fill="#2e3b18" />
      <circle cx="59" cy="74" r="4" fill="#2e3b18" />
      <circle cx="71" cy="74" r="4" fill="#2e3b18" />
      
      <!-- Artillery Hull -->
      <polygon points="12,50 20,40 70,40 85,55 85,70 12,70" fill="#6b8e23" stroke="#2e3b18" stroke-width="1.5" />
      
      <!-- Outrigger / Spade (Stabilizer at back) -->
      <polygon points="12,65 5,75 10,80 15,70" fill="#2e3b18" />

      <!-- Massive Boxy Turret (Paladin style) -->
      <polygon points="25,40 35,20 65,20 75,40" fill="#6b8e23" stroke="#2e3b18" stroke-width="2" />
      <polygon points="45,20 65,20 75,40 45,40" fill="#4a5d23" opacity="0.4" /> <!-- Shading -->

      <!-- Main Howitzer Cannon (Elevated) -->
      <g transform="rotate(-35 60 30)">
        <rect x="60" y="26" width="35" height="8" fill="#4a5d23" /> <!-- Outer sleeve -->
        <rect x="95" y="28" width="40" height="4" fill="#2e3b18" /> <!-- Inner barrel -->
        <rect x="130" y="27" width="8" height="6" fill="#6b8e23" /> <!-- Muzzle brake -->
        <!-- Recoil cylinders -->
        <rect x="65" y="23" width="20" height="3" fill="#2e3b18" />
        <rect x="65" y="34" width="20" height="3" fill="#2e3b18" />
      </g>

      <!-- Hatches & Radar (Counter-battery/Velocity radar) -->
      <rect x="35" y="17" width="10" height="3" fill="#2e3b18" />
      <circle cx="55" cy="18" r="4" fill="#ff4500" /> <!-- Sensor dome -->
      <rect x="62" y="15" width="4" height="5" fill="#2e3b18" /> <!-- Cupola -->
    </g>
  
  </g>
</svg>