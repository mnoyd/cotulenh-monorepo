<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" />
    </filter>
  </defs>
  <!-- No base shadow ellipse so it sits IN the water, not hovering -->
  
  <!-- Water wake (drawn below the boat, unaffected by boat's shadow) -->
  <path d="M 10 80 Q 30 90 50 80 T 90 80" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" />
  <path d="M 15 85 Q 35 95 60 85 T 95 85" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2" />
  
  <g filter="url(#shadow)" transform="translate(0, 15)">
    <!-- Wooden Dhow/Skiff Hull -->
    <path d="M 10 65 L 20 45 L 80 45 L 95 60 L 90 65 Z" fill="#9a3412" stroke="#4d2010" stroke-width="1.5" />
    <!-- Hull planking lines -->
    <path d="M 15 55 L 85 55 M 12 60 L 90 60 L 80 50" fill="none" stroke="#4d2010" stroke-width="1" opacity="0.6" />
    
    <!-- Scrap Metal Armor Plates -->
    <!-- Red plate on the side -->
    <path d="M 25 45 L 45 45 L 42 54 L 22 54 Z" fill="#c75b39" stroke="#8a3a1e" stroke-width="1" />
    <circle cx="26" cy="48" r="0.8" fill="#4d2010" />
    <circle cx="40" cy="48" r="0.8" fill="#4d2010" />
    <circle cx="28" cy="52" r="0.8" fill="#4d2010" />
    
    <!-- Green plate near bow -->
    <path d="M 50 45 L 75 45 L 75 52 L 48 52 Z" fill="#7a3d1a" stroke="#8a3a1e" stroke-width="1" />
    <circle cx="53" cy="48" r="0.8" fill="#1a1a1a" />
    <circle cx="72" cy="48" r="0.8" fill="#1a1a1a" />
    <circle cx="62" cy="50" r="0.8" fill="#1a1a1a" />
    
    <!-- Small cabin / Steering console -->
    <path d="M 28 45 L 28 30 L 38 30 L 38 45 Z" fill="#c75b39" stroke="#8a3a1e" stroke-width="1.5" />
    <!-- Tarp / Canopy over console -->
    <path d="M 22 30 Q 33 22 44 30 Z" fill="#d4845a" stroke="#8a3a1e" stroke-width="1" />
    <!-- Tarp supports -->
    <path d="M 24 30 L 24 45 M 42 30 L 42 45" stroke="#4d2010" stroke-width="1.5" />
    
    <!-- Outboard Motor at stern -->
    <rect x="6" y="55" width="8" height="12" fill="#2c2a26" rx="2" />
    <path d="M 10 55 L 10 48 M 8 50 L 12 50" stroke="#2c2a26" stroke-width="1.5" />
    <rect x="2" y="62" width="6" height="4" fill="#1a1a1a" />
    
    <!-- Heavy AA Gun (ZU-23-2 style) mounted on deck -->
    <!-- Mount base -->
    <path d="M 60 45 L 65 35 L 75 35 L 80 45 Z" fill="#7a3d1a" stroke="#8a3a1e" stroke-width="1" />
    <circle cx="70" cy="38" r="6" fill="#2c2a26" />
    <!-- Gunner seat -->
    <rect x="63" y="32" width="6" height="4" fill="#1a1a1a" />
    
    <!-- Twin Barrels -->
    <g transform="rotate(-15, 70, 36)">
      <rect x="70" y="34" width="26" height="2" fill="#1a1a1a" />
      <rect x="70" y="38" width="26" height="2" fill="#1a1a1a" />
      <!-- Flash hiders -->
      <rect x="94" y="33.5" width="4" height="3" fill="#2c2a26" />
      <rect x="94" y="37.5" width="4" height="3" fill="#2c2a26" />
    </g>
    <!-- Ammo box -->
    <rect x="68" y="38" width="6" height="6" fill="#8a3a1e" stroke="#4d2010" stroke-width="0.5" />
    
  </g>
</svg>