<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" />
    </filter>
  </defs>
  <ellipse cx="50" cy="85" rx="45" ry="8" fill="#1a1a1a" opacity="0.6" />
  <g filter="url(#shadow)">
    <!-- Water wake -->
    <path d="M 10 80 Q 30 90 50 80 T 90 80" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" />
    <!-- Hull (Fast Attack Craft / Missile Boat) -->
    <path d="M 5 65 L 18 45 L 75 45 L 90 65 Z" fill="#8c7a65" stroke="#6b5c4a" stroke-width="1.5" />
    <!-- Waterline -->
    <rect x="5" y="65" width="85" height="5" fill="#1a1a1a" />
    <rect x="5" y="62" width="83" height="1" fill="#c0392b" /> <!-- Red waterline accent -->
    <!-- Superstructure -->
    <path d="M 25 45 L 30 30 L 50 30 L 60 45 Z" fill="#b08d6a" stroke="#6b5c4a" stroke-width="1.5" />
    <!-- Mast -->
    <rect x="35" y="10" width="2" height="20" fill="#2c2a26" />
    <path d="M 36 20 L 45 15 L 45 20 M 36 15 L 25 10 L 25 15" fill="none" stroke="#2c2a26" stroke-width="1" />
    <!-- Large prominent missile tubes (angled) -->
    <g transform="translate(60, 40) rotate(-25)">
      <rect x="0" y="-8" width="18" height="6" fill="#5c6a4a" stroke="#3d4a35" stroke-width="1" rx="1" />
      <rect x="0" y="0" width="18" height="6" fill="#5c6a4a" stroke="#3d4a35" stroke-width="1" rx="1" />
      <rect x="0" y="8" width="18" height="6" fill="#5c6a4a" stroke="#3d4a35" stroke-width="1" rx="1" />
    </g>
    <!-- Main Gun (Smaller caliber forward) -->
    <path d="M 80 45 L 82 42 L 86 45 Z" fill="#6b5c4a" />
    <rect x="82" y="42" width="8" height="1.5" fill="#1a1a1a" />
    <!-- Windows -->
    <rect x="35" y="32" width="15" height="5" fill="#1a1a1a" />
  </g>
</svg>