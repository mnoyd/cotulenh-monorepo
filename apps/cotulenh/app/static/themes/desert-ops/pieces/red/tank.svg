<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)" />
    </filter>
  </defs>
  <!-- tank / red High Detail Modern Warfare -->
  <g filter="url(#drop-shadow)">
    
    <g>
      <!-- Tracks & Wheels -->
      <path d="M 12 70 A 10 10 0 0 0 22 80 L 78 80 A 10 10 0 0 0 88 70 Z" fill="#4a5d23" />
      <circle cx="20" cy="74" r="4" fill="#2e3b18" />
      <circle cx="32" cy="74" r="4" fill="#2e3b18" />
      <circle cx="44" cy="74" r="4" fill="#2e3b18" />
      <circle cx="56" cy="74" r="4" fill="#2e3b18" />
      <circle cx="68" cy="74" r="4" fill="#2e3b18" />
      <circle cx="80" cy="74" r="4" fill="#2e3b18" />
      
      <!-- Side Skirt / Armor -->
      <polygon points="10,50 18,50 22,65 82,65 88,50 90,50 90,70 10,70" fill="#6b8e23" stroke="#2e3b18" stroke-width="1.5" />
      <!-- Hull -->
      <polygon points="18,50 35,40 75,40 88,50" fill="#6b8e23" stroke="#2e3b18" stroke-width="1.5" />
      
      <!-- Reactive Armor Panels (Hull) -->
      <rect x="35" y="42" width="10" height="6" fill="#ff4500" opacity="0.4" />
      <rect x="47" y="42" width="10" height="6" fill="#ff4500" opacity="0.4" />
      <rect x="59" y="42" width="10" height="6" fill="#ff4500" opacity="0.4" />
      
      <!-- Main Gun Barrel & Bore Evacuator -->
      <rect x="68" y="27" width="28" height="4" fill="#4a5d23" />
      <rect x="75" y="26" width="10" height="6" fill="#2e3b18" /> <!-- Evacuator -->
      <rect x="94" y="26" width="2" height="6" fill="#6b8e23" /> <!-- Muzzle brake -->

      <!-- Turret Base & Sloped Armor -->
      <polygon points="30,40 40,22 65,22 72,40" fill="#6b8e23" stroke="#2e3b18" stroke-width="2" />
      <polygon points="40,22 50,22 55,40 30,40" fill="#4a5d23" opacity="0.6"/> <!-- Shadow side -->
      
      <!-- Turret Details (Optics/Hatch/MG/Antenna) -->
      <rect x="42" y="16" width="8" height="6" fill="#2e3b18" /> <!-- Hatch -->
      <circle cx="46" cy="16" r="3" fill="#6b8e23" />
      <rect x="52" y="18" width="6" height="4" fill="#ff4500" /> <!-- Optics / Sensor -->
      <line x1="35" y1="22" x2="33" y2="5" stroke="#2e3b18" stroke-width="1.5" /> <!-- Antenna -->
      <polygon points="45,15 48,12 55,14 55,16" fill="#4a5d23" /> <!-- Commander MG -->

      <!-- Engine Grill (Rear) -->
      <rect x="22" y="42" width="6" height="6" fill="#2e3b18" />
      <rect x="20" y="42" width="1" height="6" fill="#4a5d23" />
    </g>
  
  </g>
</svg>