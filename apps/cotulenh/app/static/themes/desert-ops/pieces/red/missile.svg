<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" />
    </filter>
  </defs>
  <ellipse cx="50" cy="85" rx="42" ry="8" fill="#1a1a1a" opacity="0.6" />
  <g filter="url(#shadow)">
    <!-- TEL Truck (Shahab vibe) -->
    <rect x="10" y="65" width="80" height="12" fill="#8c7a65" stroke="#6b5c4a" stroke-width="1.5" rx="2" />
    <circle cx="18" cy="77" r="4.5" fill="#2c2a26" />
    <circle cx="28" cy="77" r="4.5" fill="#2c2a26" />
    <circle cx="38" cy="77" r="4.5" fill="#2c2a26" />
    <circle cx="48" cy="77" r="4.5" fill="#2c2a26" />
    <circle cx="72" cy="77" r="4.5" fill="#2c2a26" />
    <circle cx="82" cy="77" r="4.5" fill="#2c2a26" />
    <!-- Cab -->
    <path d="M 70 65 L 70 52 L 85 52 L 90 65 Z" fill="#8c7a65" stroke="#6b5c4a" stroke-width="1" />
    <rect x="75" y="55" width="5" height="5" fill="#1a1a1a" />
    <!-- Erector arm / mount -->
    <rect x="35" y="60" width="10" height="8" fill="#5c6a4a" />
    <!-- Missile (Erected at roughly 60 degrees) -->
    <g transform="translate(40, 65) rotate(-60)">
      <!-- Missile Body -->
      <rect x="0" y="-8" width="55" height="16" fill="#b08d6a" stroke="#6b5c4a" stroke-width="1.5" />
      <rect x="40" y="-8" width="5" height="16" fill="#8c7a65" />
      <!-- Checker pattern / details -->
      <rect x="15" y="-8" width="4" height="16" fill="#5c6a4a" />
      <!-- Pointy Warhead -->
      <path d="M 55 -8 L 75 0 L 55 8 Z" fill="#8c7a65" stroke="#6b5c4a" stroke-width="1.5" />
      <!-- Fins -->
      <path d="M 5 -8 L 15 -12 L 15 -8 Z" fill="#5c6a4a" />
      <path d="M 5 8 L 15 12 L 15 8 Z" fill="#5c6a4a" />
    </g>
  </g>
</svg>