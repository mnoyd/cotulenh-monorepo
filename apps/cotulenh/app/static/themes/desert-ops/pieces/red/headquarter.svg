<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)" />
    </filter>
  </defs>
  <!-- headquarter / red High Detail Modern Warfare -->
  <g filter="url(#drop-shadow)">
    
    <g>
      <!-- Base & HESCO barriers (sandbag walls) -->
      <rect x="10" y="70" width="80" height="15" fill="#6b8e23" stroke="#2e3b18" stroke-width="1" />
      <!-- Barrier grid lines -->
      <line x1="20" y1="70" x2="20" y2="85" stroke="#2e3b18" opacity="0.5" />
      <line x1="30" y1="70" x2="30" y2="85" stroke="#2e3b18" opacity="0.5" />
      <line x1="40" y1="70" x2="40" y2="85" stroke="#2e3b18" opacity="0.5" />
      <line x1="50" y1="70" x2="50" y2="85" stroke="#2e3b18" opacity="0.5" />
      <line x1="60" y1="70" x2="60" y2="85" stroke="#2e3b18" opacity="0.5" />
      <line x1="70" y1="70" x2="70" y2="85" stroke="#2e3b18" opacity="0.5" />
      <line x1="80" y1="70" x2="80" y2="85" stroke="#2e3b18" opacity="0.5" />
      
      <!-- Main TOC (Tactical Operations Center) Building / Tent -->
      <path d="M 25 70 L 25 45 C 25 35, 75 35, 75 45 L 75 70 Z" fill="#2e3b18" />
      <path d="M 28 70 L 28 48 C 28 40, 72 40, 72 48 L 72 70 Z" fill="#6b8e23" />
      <!-- Camo Netting draped -->
      <path d="M 20 45 Q 35 30 50 40 T 80 45 L 80 55 Q 65 45 50 50 T 20 55 Z" fill="#4a5d23" opacity="0.5" />

      <!-- Massive Radome (Radar Dome) -->
      <circle cx="85" cy="50" r="10" fill="#6b8e23" stroke="#2e3b18" stroke-width="1.5" />
      <path d="M 80 40 L 90 60 M 90 40 L 80 60 M 75 50 L 95 50" stroke="#2e3b18" stroke-width="0.5" opacity="0.5" /> <!-- Panels -->
      <rect x="80" y="60" width="10" height="10" fill="#4a5d23" /> <!-- Pillar -->

      <!-- Advanced Satellite Comm Array -->
      <rect x="15" y="45" width="2" height="25" fill="#4a5d23" />
      <!-- Sat Dish -->
      <ellipse cx="14" cy="40" rx="4" ry="10" fill="#6b8e23" stroke="#2e3b18" stroke-width="1" transform="rotate(30 14 40)" />
      <circle cx="16" cy="40" r="2" fill="#ff4500" />

      <!-- Entryway / Guard Post -->
      <rect x="42" y="60" width="16" height="10" fill="#4a5d23" />
      <rect x="45" y="62" width="10" height="8" fill="#ff4500" opacity="0.8" /> <!-- Light glow from inside -->
    </g>
  
  </g>
</svg>