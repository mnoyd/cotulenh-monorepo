<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Rich Drop Shadow -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.5)" />
    </filter>
    <!-- Glowing Neon Accents -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Metallic/Gloss Gradients -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b9e63" />
      <stop offset="100%" stop-color="#556b2f" />
    </linearGradient>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#8b9e63" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#556b2f" />
      <stop offset="100%" stop-color="#3e4f20" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3300" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ff3300" stop-opacity="0.1" />
    </linearGradient>
    <radialGradient id="baseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#1a240c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1a240c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- High-Tech Holographic Base -->
  
    <!-- High-tech projected base ring -->
    <ellipse cx="50" cy="88" rx="40" ry="8" fill="url(#baseGrad)" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.8" />
    <ellipse cx="50" cy="88" rx="36" ry="6" fill="none" stroke="#ff3300" stroke-width="0.5" opacity="0.6" stroke-dasharray="4 2" />
    <circle cx="50" cy="88" r="2" fill="#ff3300" />
  

  <!-- Premium headquarter / red -->
  <g filter="url(#drop-shadow)">
    
    <g transform="translate(0,-5)">
      <!-- HESCO Barriers -->
      <rect x="10" y="70" width="80" height="15" fill="url(#lightGrad)" stroke="#1a240c" stroke-width="1.5" />
      <line x1="30" y1="70" x2="30" y2="85" stroke="#1a240c" />
      <line x1="50" y1="70" x2="50" y2="85" stroke="#1a240c" />
      <line x1="70" y1="70" x2="70" y2="85" stroke="#1a240c" />
      <!-- TOC Building -->
      <path d="M 25 70 L 25 45 C 25 35, 75 35, 75 45 L 75 70 Z" fill="url(#darkGrad)" />
      <path d="M 28 70 L 28 48 C 28 40, 72 40, 72 48 L 72 70 Z" fill="url(#mainGrad)" />
      <!-- Radome -->
      <circle cx="85" cy="50" r="12" fill="url(#lightGrad)" stroke="#1a240c" stroke-width="1.5" />
      <circle cx="85" cy="50" r="6" fill="none" stroke="#ff3300" stroke-width="1" opacity="0.5" />
      <rect x="82" y="62" width="6" height="8" fill="#1a240c" />
      <!-- Satcom Array -->
      <rect x="15" y="45" width="2" height="25" fill="#1a240c" />
      <ellipse cx="14" cy="40" rx="5" ry="12" fill="url(#lightGrad)" transform="rotate(25 14 40)" />
      <circle cx="16" cy="40" r="3" fill="#ff3300" filter="url(#glow)" />
      <!-- Glowing Entrance -->
      <rect x="42" y="60" width="16" height="10" fill="#1a240c" />
      <rect x="45" y="62" width="10" height="8" fill="#ff3300" filter="url(#glow)" opacity="0.9" />
    </g>
  
  </g>
</svg>