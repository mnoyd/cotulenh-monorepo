<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)" />
    </filter>
  </defs>
  <!-- militia / red High Detail Modern Warfare -->
  <g filter="url(#drop-shadow)">
    
    <g>
      <!-- "Technical" Pickup Truck -->
      <!-- Wheels (All-terrain off-road tires) -->
      <circle cx="25" cy="80" r="8" fill="#4a5d23" stroke="#2e3b18" stroke-width="2" stroke-dasharray="2 1" />
      <circle cx="75" cy="80" r="8" fill="#4a5d23" stroke="#2e3b18" stroke-width="2" stroke-dasharray="2 1" />

      <!-- Truck Body -->
      <!-- Bed -->
      <polygon points="10,65 10,55 40,55 40,65" fill="#6b8e23" stroke="#2e3b18" stroke-width="1.5" />
      <!-- Cab -->
      <polygon points="40,65 40,40 60,40 65,55 85,55 90,65" fill="#6b8e23" stroke="#2e3b18" stroke-width="1.5" />
      
      <!-- Windows / Door -->
      <polygon points="43,43 57,43 60,55 43,55" fill="#2e3b18" />
      <line x1="52" y1="43" x2="52" y2="65" stroke="#4a5d23" stroke-width="1" /> <!-- Door seam -->

      <!-- Details (Headlights, Grill, Bumper) -->
      <rect x="85" y="57" width="5" height="3" fill="#fff" opacity="0.8" /> <!-- Headlight -->
      <rect x="90" y="60" width="5" height="8" fill="#4a5d23" rx="1" /> <!-- Bullbar -->
      <line x1="85" y1="65" x2="10" y2="65" stroke="#2e3b18" stroke-width="2" /> <!-- Chassis -->

      <!-- Militia Details: Heavy Machine Gun (DShK/KPV style) mounted in back -->
      <rect x="28" y="45" width="4" height="10" fill="#4a5d23" /> <!-- Mount -->
      <polygon points="25,55 31,55 28,45" fill="#2e3b18" /> <!-- Tripod -->
      <!-- Gun Body -->
      <rect x="15" y="42" width="25" height="4" fill="#2e3b18" />
      <!-- Long Barrel -->
      <rect x="0" y="43" width="15" height="2" fill="#4a5d23" />
      <!-- Ammo Box -->
      <rect x="23" y="44" width="6" height="5" fill="#ff4500" />
      <!-- Gunner shield -->
      <polygon points="35,35 40,40 35,50" fill="#6b8e23" stroke="#2e3b18" stroke-width="1" opacity="0.8" />

      <!-- Identity: Militia Flag/Bandana flying -->
      <path d="M 12 30 Q 5 25 15 20 Q 25 15 25 25 T 12 30" fill="#ff4500" opacity="0.9" />
      <line x1="12" y1="30" x2="12" y2="55" stroke="#4a5d23" stroke-width="1" />
    </g>
  
  </g>
</svg>