<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Rich Drop Shadow -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.5)" />
    </filter>
    <!-- Glowing Neon Accents -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Metallic/Gloss Gradients -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b9e63" />
      <stop offset="100%" stop-color="#556b2f" />
    </linearGradient>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#8b9e63" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#556b2f" />
      <stop offset="100%" stop-color="#3e4f20" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3300" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ff3300" stop-opacity="0.1" />
    </linearGradient>
    <radialGradient id="baseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#1a240c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1a240c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- High-Tech Holographic Base -->
  
    <!-- High-tech projected base ring -->
    <ellipse cx="50" cy="88" rx="40" ry="8" fill="url(#baseGrad)" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.8" />
    <ellipse cx="50" cy="88" rx="36" ry="6" fill="none" stroke="#ff3300" stroke-width="0.5" opacity="0.6" stroke-dasharray="4 2" />
    <circle cx="50" cy="88" r="2" fill="#ff3300" />
  

  <!-- Premium militia / red -->
  <g filter="url(#drop-shadow)">
    
    <g transform="translate(0,-5)">
      <!-- Tires -->
      <circle cx="25" cy="80" r="9" fill="url(#darkGrad)" stroke="#1a240c" stroke-width="2" />
      <circle cx="75" cy="80" r="9" fill="url(#darkGrad)" stroke="#1a240c" stroke-width="2" />
      <!-- Technical Bed -->
      <polygon points="10,65 10,55 40,55 40,65" fill="url(#darkGrad)" stroke="#1a240c" stroke-width="1.5" />
      <!-- Cab -->
      <polygon points="40,65 40,40 60,40 65,55 85,55 90,65" fill="url(#mainGrad)" stroke="#1a240c" stroke-width="1.5" />
      <polygon points="43,43 57,43 60,55 43,55" fill="#ff3300" opacity="0.6" />
      <rect x="85" y="57" width="6" height="4" fill="#fff" filter="url(#glow)" />
      <!-- HMG -->
      <rect x="28" y="45" width="4" height="10" fill="#1a240c" />
      <rect x="15" y="42" width="25" height="5" fill="url(#darkGrad)" />
      <rect x="0" y="43.5" width="15" height="2" fill="#1a240c" />
      <rect x="23" y="44" width="6" height="5" fill="#ff3300" />
      <polygon points="35,35 40,40 35,50" fill="url(#lightGrad)" opacity="0.8" />
      <!-- Pennant -->
      <path d="M 12 30 Q 5 25 15 20 Q 25 15 25 25 T 12 30" fill="#ff3300" />
      <line x1="12" y1="30" x2="12" y2="55" stroke="#1a240c" stroke-width="1" />
    </g>
  
  </g>
</svg>