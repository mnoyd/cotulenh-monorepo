<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" />
    </filter>
  </defs>
  <ellipse cx="50" cy="90" rx="35" ry="5" fill="#1a1a1a" opacity="0.6" />
  <g filter="url(#shadow)">
    <!-- Body -->
    <path d="M 35 90 C 35 60, 40 55, 50 55 C 60 55, 65 60, 65 90 Z" fill="#fb923c" stroke="#ea580c" stroke-width="1.5" />
    <path d="M 35 90 L 50 65 L 65 90" fill="none" stroke="#2c2a26" stroke-width="1" opacity="0.3" />
    <!-- Head -->
    <path d="M 38 45 C 38 25, 62 25, 62 45 C 62 55, 58 58, 50 58 C 42 58, 38 55, 38 45 Z" fill="#ea580c" stroke="#2c2a26" stroke-width="1.5" />
    <!-- Bandana / Keffiyeh wrap -->
    <path d="M 34 25 C 40 15, 60 15, 66 25 Q 50 35 34 25 Z" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5" />
    <path d="M 34 25 C 30 35, 30 50, 42 55 L 42 40" fill="#fef3c7" stroke="#fcd34d" stroke-width="1" />
    <path d="M 66 25 C 70 35, 70 50, 58 55 L 58 40" fill="#fef3c7" stroke="#fcd34d" stroke-width="1" />
    <!-- RPG-7 Silhouette (to make them distinct from infantry) -->
    <g transform="translate(45, 65) rotate(-35)">
      <rect x="-10" y="0" width="35" height="4" fill="#78350f" /> <!-- Tube -->
      <rect x="25" y="-3" width="15" height="10" fill="#7c2d12" rx="5" /> <!-- Warhead -->
      <rect x="40" y="-1" width="5" height="6" fill="#ea580c" rx="2" /> <!-- Tip -->
      <rect x="5" y="4" width="3" height="10" fill="#2c2a26" /> <!-- Grip -->
      <rect x="15" y="4" width="3" height="8" fill="#2c2a26" /> <!-- Handle 2 -->
    </g>
  </g>
</svg>