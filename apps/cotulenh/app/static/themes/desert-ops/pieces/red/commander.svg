<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Rich Drop Shadow -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.5)" />
    </filter>
    <!-- Glowing Neon Accents -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Metallic/Gloss Gradients -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b9e63" />
      <stop offset="100%" stop-color="#556b2f" />
    </linearGradient>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#8b9e63" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#556b2f" />
      <stop offset="100%" stop-color="#3e4f20" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3300" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ff3300" stop-opacity="0.1" />
    </linearGradient>
    <radialGradient id="baseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#1a240c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1a240c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- High-Tech Holographic Base -->
  
    <!-- High-tech projected base ring -->
    <ellipse cx="50" cy="88" rx="40" ry="8" fill="url(#baseGrad)" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.8" />
    <ellipse cx="50" cy="88" rx="36" ry="6" fill="none" stroke="#ff3300" stroke-width="0.5" opacity="0.6" stroke-dasharray="4 2" />
    <circle cx="50" cy="88" r="2" fill="#ff3300" />
  

  <!-- Premium commander / red -->
  <g filter="url(#drop-shadow)">
    
    <g transform="translate(0,-5)">
      <!-- 8-Wheel Mobile Command -->
      <circle cx="20" cy="75" r="7" fill="url(#darkGrad)" stroke="#1a240c" stroke-width="1.5" />
      <circle cx="38" cy="75" r="7" fill="url(#darkGrad)" stroke="#1a240c" stroke-width="1.5" />
      <circle cx="62" cy="75" r="7" fill="url(#darkGrad)" stroke="#1a240c" stroke-width="1.5" />
      <circle cx="80" cy="75" r="7" fill="url(#darkGrad)" stroke="#1a240c" stroke-width="1.5" />
      <!-- Hull -->
      <polygon points="10,50 25,35 85,35 90,55 90,70 10,70" fill="url(#mainGrad)" stroke="#1a240c" stroke-width="1.5" />
      <!-- Extended Roof / C2 Module -->
      <polygon points="30,35 35,25 75,25 80,35" fill="url(#lightGrad)" stroke="#1a240c" stroke-width="1.5" />
      <!-- Prominent Star embedded -->
      <circle cx="55" cy="55" r="11" fill="#1a240c" />
      <polygon points="55,47 58,53 65,53 59,57 62,64 55,59 48,64 51,57 45,53 52,53" fill="#ff3300" filter="url(#glow)" />
      <!-- Satcom -->
      <path d="M 65 25 L 75 12 C 82 17, 82 25, 75 25 Z" fill="url(#darkGrad)" />
      <circle cx="70" cy="18" r="3" fill="#ff3300" filter="url(#glow)" />
      <!-- Glowing Sensor Mast -->
      <rect x="48" y="5" width="4" height="20" fill="#1a240c" />
      <rect x="44" y="2" width="12" height="6" fill="#ff3300" rx="2" filter="url(#glow)" />
    </g>
  
  </g>
</svg>