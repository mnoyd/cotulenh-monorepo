<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)" />
    </filter>
  </defs>
  <!-- commander / red High Detail Modern Warfare -->
  <g filter="url(#drop-shadow)">
    
    <g>
      <!-- Mobile Command Post (Stryker/LAV Variant) -->
      <!-- 8-Wheel drive -->
      <circle cx="20" cy="75" r="6" fill="#4a5d23" stroke="#2e3b18" stroke-width="1.5" />
      <circle cx="38" cy="75" r="6" fill="#4a5d23" stroke="#2e3b18" stroke-width="1.5" />
      <circle cx="62" cy="75" r="6" fill="#4a5d23" stroke="#2e3b18" stroke-width="1.5" />
      <circle cx="80" cy="75" r="6" fill="#4a5d23" stroke="#2e3b18" stroke-width="1.5" />

      <!-- Hull (Tall, sloped armor) -->
      <polygon points="10,50 25,35 85,35 90,55 90,70 10,70" fill="#6b8e23" stroke="#2e3b18" stroke-width="1.5" />
      <polygon points="10,50 25,35 30,50" fill="#2e3b18" opacity="0.4" />

      <!-- Command Module Extender (Raised roof) -->
      <rect x="35" y="25" width="40" height="10" fill="#4a5d23" opacity="0.8" />
      <polygon points="30,35 35,25 75,25 80,35" fill="#6b8e23" stroke="#2e3b18" stroke-width="1" />

      <!-- Commander's Status / Identity (Officer Star embedded in side armor) -->
      <circle cx="55" cy="55" r="10" fill="#4a5d23" />
      <polygon points="55,48 58,53 64,53 59,57 61,63 55,59 49,63 51,57 46,53 52,53" fill="#ff4500" />

      <!-- Heavy Communications / C4ISR Equipment -->
      <!-- Front antennas -->
      <line x1="28" y1="35" x2="25" y2="10" stroke="#2e3b18" stroke-width="1" />
      <line x1="32" y1="35" x2="30" y2="15" stroke="#2e3b18" stroke-width="1" />
      
      <!-- Satcom Dish on roof -->
      <path d="M 65 25 L 75 15 C 80 20, 80 25, 75 25 Z" fill="#2e3b18" />
      <circle cx="70" cy="20" r="2" fill="#ff4500" />

      <!-- Sensor Mast (Elevated) -->
      <rect x="48" y="5" width="4" height="20" fill="#4a5d23" />
      <rect x="45" y="3" width="10" height="4" fill="#ff4500" rx="1" /> <!-- Glowing Sensor package -->
      
      <!-- Defensive remote turret -->
      <rect x="80" y="30" width="8" height="5" fill="#2e3b18" />
      <rect x="85" y="32" width="8" height="2" fill="#4a5d23" />
    </g>
  
  </g>
</svg>