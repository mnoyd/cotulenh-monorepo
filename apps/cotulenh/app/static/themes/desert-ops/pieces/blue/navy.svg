<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" />
    </filter>
  </defs>
  <!-- No base shadow ellipse so it sits IN the water, not hovering -->
  
  <!-- Water wake (drawn below the boat, unaffected by boat's shadow) -->
  <path d="M 10 80 Q 30 90 50 80 T 90 80" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" />
  <path d="M 15 85 Q 35 95 60 85 T 95 85" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2" />
  
  <g filter="url(#shadow)" transform="translate(0, 15)">
    <!-- Shallow Hull (PBR Style) -->
    <!-- Slightly angled up at the bow (right) -->
    <path d="M 10 65 L 15 50 L 75 50 L 92 60 L 90 65 Z" fill="#3480a8" stroke="#2c7a9e" stroke-width="1.5" />
    
    <!-- Waterline -->
    <path d="M 10 63 L 91 63" stroke="#1a1a1a" stroke-width="2" />
    <path d="M 10 60 L 92 60" stroke="#3b8cc4" stroke-width="1" opacity="0.5" />
    
    <!-- Cabin Base -->
    <path d="M 30 50 L 35 35 L 55 35 L 60 50 Z" fill="#3b8cc4" stroke="#2c7a9e" stroke-width="1.5" />
    <!-- Cabin Windows -->
    <rect x="40" y="38" width="12" height="6" fill="#1a1a1a" rx="1" />
    <path d="M 54 38 L 57 48 L 53 48 L 52 38 Z" fill="#1a1a1a" />
    
    <!-- Canvas Canopy -->
    <path d="M 30 35 Q 45 25 60 35 Z" fill="#fcd34d" stroke="#fbbf24" stroke-width="1" />
    <!-- Canopy Supports -->
    <path d="M 35 35 L 35 50 M 55 35 L 55 50" stroke="#2c7a9e" stroke-width="1.5" />
    <path d="M 45 30 L 45 50" stroke="#2c7a9e" stroke-width="1" opacity="0.5" />
    
    <!-- Radar / Mast on Canopy -->
    <rect x="43" y="20" width="4" height="10" fill="#2c7a9e" />
    <ellipse cx="45" cy="18" rx="6" ry="3" fill="#3b8cc4" stroke="#2c7a9e" stroke-width="1" />
    <path d="M 45 15 L 45 10" stroke="#1a1a1a" stroke-width="1" />
    
    <!-- Twin .50 Caliber Forward Gun Mount (Tub) -->
    <path d="M 75 50 L 85 50 L 83 40 L 77 40 Z" fill="#2a6d8a" stroke="#2c7a9e" stroke-width="1" />
    <!-- Gunner shield -->
    <path d="M 83 44 C 85 36, 88 36, 90 42" fill="none" stroke="#3480a8" stroke-width="2" />
    <!-- Guns -->
    <g transform="rotate(-15, 80, 39)">
      <rect x="78" y="38" width="16" height="2" fill="#1a1a1a" />
      <rect x="78" y="41" width="16" height="2" fill="#1a1a1a" />
    </g>

    <!-- Rear Gun Mount -->
    <circle cx="20" cy="46" r="4" fill="#2a6d8a" stroke="#2c7a9e" stroke-width="1" />
    <g transform="rotate(-10, 18, 43)">
      <rect x="18" y="42" width="12" height="2" fill="#1a1a1a" />
    </g>
  </g>
</svg>