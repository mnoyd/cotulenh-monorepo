<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" />
    </filter>
  </defs>
  <ellipse cx="50" cy="85" rx="45" ry="8" fill="#1a1a1a" opacity="0.6" />
  <g filter="url(#shadow)">
    <!-- Water wake -->
    <path d="M 10 80 Q 30 90 50 80 T 90 80" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" />
    <!-- Hull (Sa'ar 6 Stealth Corvette style) -->
    <path d="M 5 65 L 15 45 L 80 45 L 95 65 Z" fill="#5c6a7a" stroke="#3a4a5a" stroke-width="1.5" />
    <!-- Waterline -->
    <rect x="5" y="65" width="90" height="5" fill="#1a1a1a" />
    <!-- Superstructure (Stealthy angular) -->
    <path d="M 25 45 L 35 25 L 55 25 L 65 45 Z" fill="#6c7a8a" stroke="#3a4a5a" stroke-width="1.5" />
    <path d="M 35 25 L 45 15 L 50 15 L 55 25 Z" fill="#5c6a7a" stroke="#3a4a5a" stroke-width="1" />
    <!-- Radar Dome inside stealth mast -->
    <ellipse cx="45" cy="18" rx="3" ry="2" fill="#d4c0a5" />
    <!-- Main Gun (Oto Melara 76mm vibe) -->
    <path d="M 70 45 L 75 42 L 85 45 Z" fill="#4a5a6a" />
    <rect x="75" y="42.5" width="12" height="1.5" fill="#1a1a1a" />
    <!-- Anti-ship missile launchers -->
    <rect x="40" y="35" width="10" height="5" fill="#3a4a5a" transform="rotate(-15, 40, 35)" />
    <!-- Helipad lines -->
    <ellipse cx="20" cy="55" rx="8" ry="2" fill="none" stroke="#d4c0a5" stroke-width="1" opacity="0.5" />
    <path d="M 16 55 L 24 55 M 20 53 L 20 57" stroke="#d4c0a5" stroke-width="1" opacity="0.5" />
  </g>
</svg>