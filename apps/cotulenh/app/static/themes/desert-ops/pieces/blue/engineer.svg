<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" />
    </filter>
  </defs>
  <ellipse cx="50" cy="90" rx="35" ry="5" fill="#1a1a1a" opacity="0.6" />
  <g filter="url(#shadow)">
    <!-- Backpack (Explosives/Gear) -->
    <path d="M 25 50 L 35 50 L 35 85 L 20 85 Z" fill="#0369a1" stroke="#0f172a" stroke-width="1.5" />
    <rect x="22" y="55" width="8" height="15" fill="#0f172a" rx="2" />
    <rect x="22" y="75" width="8" height="5" fill="#0f172a" />
    <!-- Body -->
    <path d="M 35 90 C 35 60, 40 55, 50 55 C 60 55, 65 60, 65 90 Z" fill="#38bdf8" stroke="#0f172a" stroke-width="1.5" />
    <!-- Vest/Plate Carrier -->
    <path d="M 40 90 L 42 65 L 58 65 L 60 90 Z" fill="#7dd3fc" stroke="#0369a1" stroke-width="1" />
    <!-- Head/Helmet -->
    <path d="M 38 45 C 38 25, 62 25, 62 45 C 62 55, 58 58, 50 58 C 42 58, 38 55, 38 45 Z" fill="#fcd34d" stroke="#2c2a26" stroke-width="1.5" />
    <!-- Tactical Helmet with prominent goggles down -->
    <path d="M 37 46 C 37 28, 63 28, 63 46 Q 50 40 37 46 Z" fill="#0369a1" stroke="#0f172a" stroke-width="1.5" />
    <!-- Goggles on eyes -->
    <rect x="42" y="42" width="16" height="8" rx="2" fill="#1a1a1a" />
    <rect x="43" y="43" width="6" height="6" fill="#0e0e0e" />
    <rect x="51" y="43" width="6" height="6" fill="#0e0e0e" />
    <!-- Mine detector or specialized tool -->
    <g transform="translate(60, 65) rotate(15)">
      <rect x="0" y="-10" width="3" height="35" fill="#2c2a26" /> <!-- Shaft -->
      <ellipse cx="1" cy="25" rx="10" ry="3" fill="#7dd3fc" stroke="#2c2a26" stroke-width="1.5" /> <!-- Coil -->
      <rect x="-4" y="0" width="10" height="4" fill="#1a1a1a" rx="1" /> <!-- Handle / Monitor -->
      <rect x="-5" y="-10" width="12" height="6" fill="#0369a1" /> <!-- Armrest -->
    </g>
  </g>
</svg>