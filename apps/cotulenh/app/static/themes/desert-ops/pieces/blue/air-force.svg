<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)" />
    </filter>
  </defs>
  <!-- air-force / blue High Detail Modern Warfare -->
  <g filter="url(#drop-shadow)">
    
    <g>
      <!-- Shadow -->
      <polygon points="50,15 10,65 50,85 90,65" fill="#8b7355" opacity="0.2" transform="translate(0, 10)" />

      <!-- Top-Down Jet Fighter (F-35 / F-22 Style) -->
      <!-- Main fuselage -->
      <polygon points="50,10 42,30 40,65 45,85 55,85 60,65 58,30" fill="#d2b48c" stroke="#5c452b" stroke-width="2" />
      
      <!-- Swept Wings -->
      <polygon points="40,45 15,65 15,75 42,65" fill="#d2b48c" stroke="#5c452b" stroke-width="1.5" />
      <polygon points="60,45 85,65 85,75 58,65" fill="#d2b48c" stroke="#5c452b" stroke-width="1.5" />
      
      <!-- Tailplane (Horizontal Stabilizers) -->
      <polygon points="43,75 30,85 30,90 45,85" fill="#d2b48c" stroke="#5c452b" stroke-width="1" />
      <polygon points="57,75 70,85 70,90 55,85" fill="#d2b48c" stroke="#5c452b" stroke-width="1" />

      <!-- Twin Engine nozzles -->
      <circle cx="46" cy="85" r="4" fill="#5c452b" />
      <circle cx="54" cy="85" r="4" fill="#5c452b" />
      <!-- Afterburner glow -->
      <polygon points="44,87 48,87 46,95" fill="#e6c200" />
      <polygon points="52,87 56,87 54,95" fill="#e6c200" />

      <!-- Cockpit Glass (Gold-tinted stealth aesthetic) -->
      <polygon points="50,25 45,40 50,55 55,40" fill="#e6c200" opacity="0.8" />
      <polygon points="50,25 46,35 50,45" fill="#fff" opacity="0.4" /> <!-- Highlight -->

      <!-- Panel Lines / Weapon Bays -->
      <rect x="46" y="55" width="8" height="15" fill="none" stroke="#5c452b" stroke-width="1" />
      <line x1="18" y1="65" x2="35" y2="58" stroke="#5c452b" stroke-width="1" opacity="0.5" />
      <line x1="82" y1="65" x2="65" y2="58" stroke="#5c452b" stroke-width="1" opacity="0.5" />

      <!-- Wingtip Missiles -->
      <rect x="13" y="60" width="2" height="15" fill="#8b7355" />
      <rect x="85" y="60" width="2" height="15" fill="#8b7355" />
    </g>
  
  </g>
</svg>