<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Rich Drop Shadow -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.5)" />
    </filter>
    <!-- Glowing Neon Accents -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Metallic/Gloss Gradients -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e6d2b5" />
      <stop offset="100%" stop-color="#c2a880" />
    </linearGradient>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#e6d2b5" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c2a880" />
      <stop offset="100%" stop-color="#8b7355" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.1" />
    </linearGradient>
    <radialGradient id="baseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#4a3b2c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a3b2c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- High-Tech Holographic Base -->
  
    <!-- High-tech projected base ring -->
    <ellipse cx="50" cy="88" rx="40" ry="8" fill="url(#baseGrad)" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.8" />
    <ellipse cx="50" cy="88" rx="36" ry="6" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.6" stroke-dasharray="4 2" />
    <circle cx="50" cy="88" r="2" fill="#00e5ff" />
  

  <!-- Premium artillery / blue -->
  <g filter="url(#drop-shadow)">
    
    <g transform="translate(0,-5)">
      <!-- Tracks -->
      <path d="M 15 70 A 10 10 0 0 0 25 80 L 70 80 A 10 10 0 0 0 80 70 Z" fill="url(#darkGrad)" />
      <!-- Hull -->
      <polygon points="12,50 20,40 70,40 85,55 85,70 12,70" fill="url(#mainGrad)" stroke="#4a3b2c" stroke-width="1.5" />
      <polygon points="12,65 5,75 10,80 15,70" fill="url(#darkGrad)" />
      <!-- Turret -->
      <polygon points="25,40 35,20 65,20 75,40" fill="url(#lightGrad)" stroke="#4a3b2c" stroke-width="1.5" />
      <!-- Cannon -->
      <g transform="rotate(-35 60 30)">
        <rect x="60" y="26" width="40" height="8" fill="url(#darkGrad)" />
        <rect x="100" y="28" width="35" height="4" fill="url(#mainGrad)" stroke="#4a3b2c" stroke-width="0.5" />
        <rect x="135" y="27" width="8" height="6" fill="url(#lightGrad)" />
      </g>
      <!-- Radar -->
      <circle cx="55" cy="18" r="5" fill="#00e5ff" filter="url(#glow)" />
    </g>
  
  </g>
</svg>