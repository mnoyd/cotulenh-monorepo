<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" />
    </filter>
  </defs>
  <ellipse cx="50" cy="85" rx="42" ry="8" fill="#1a1a1a" opacity="0.6" />
  <g filter="url(#shadow)">
    <!-- Tracks -->
    <rect x="15" y="65" width="70" height="15" rx="5" fill="#2c2a26" stroke="#1a1a1a" stroke-width="2" />
    <circle cx="20" cy="72.5" r="4" fill="#4a4a4a" />
    <circle cx="32" cy="72.5" r="4" fill="#4a4a4a" />
    <circle cx="44" cy="72.5" r="4" fill="#4a4a4a" />
    <circle cx="56" cy="72.5" r="4" fill="#4a4a4a" />
    <circle cx="68" cy="72.5" r="4" fill="#4a4a4a" />
    <circle cx="80" cy="72.5" r="4" fill="#4a4a4a" />
    <!-- Hull Boxy M109 style -->
    <path d="M 12 50 L 85 50 L 88 65 L 10 65 Z" fill="#3b8cc4" stroke="#1a2520" stroke-width="1.5" />
    <rect x="14" y="50" width="70" height="8" fill="#6aadcc" />
    <!-- Massive Boxy Turret -->
    <rect x="15" y="25" width="50" height="25" fill="#3b8cc4" stroke="#1a2520" stroke-width="1.5" />
    <path d="M 15 25 L 25 20 L 65 20 L 65 25 Z" fill="#6aadcc" />
    <!-- Massive Muzzle/Barrel angled up slightly -->
    <g transform="translate(60, 35) rotate(-15)">
      <rect x="0" y="0" width="35" height="6" fill="#2a6d8a" stroke="#2c2a26" stroke-width="1" />
      <rect x="30" y="-2" width="6" height="10" fill="#1a2520" /> <!-- Muzzle brake -->
    </g>
    <!-- Recoil mechanics / mantlet -->
    <rect x="55" y="28" width="10" height="12" fill="#2a6d8a" rx="2" />
    <!-- Antenna/radar dish -->
    <rect x="25" y="10" width="2" height="10" fill="#2c2a26" />
    <ellipse cx="45" cy="18" rx="8" ry="2" fill="#1a2520" />
  </g>
</svg>