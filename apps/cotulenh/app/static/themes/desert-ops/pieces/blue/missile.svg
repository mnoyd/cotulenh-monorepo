<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Rich Drop Shadow -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.5)" />
    </filter>
    <!-- Glowing Neon Accents -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Metallic/Gloss Gradients -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e6d2b5" />
      <stop offset="100%" stop-color="#c2a880" />
    </linearGradient>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#e6d2b5" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c2a880" />
      <stop offset="100%" stop-color="#8b7355" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.1" />
    </linearGradient>
    <radialGradient id="baseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#4a3b2c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a3b2c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- High-Tech Holographic Base -->
  
    <!-- High-tech projected base ring -->
    <ellipse cx="50" cy="88" rx="40" ry="8" fill="url(#baseGrad)" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.8" />
    <ellipse cx="50" cy="88" rx="36" ry="6" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.6" stroke-dasharray="4 2" />
    <circle cx="50" cy="88" r="2" fill="#00e5ff" />
  

  <!-- Premium missile / blue -->
  <g filter="url(#drop-shadow)">
    
    <g transform="translate(0,-5)">
      <!-- Truck Chassis -> TEL -->
      <rect x="10" y="65" width="80" height="15" rx="3" fill="url(#mainGrad)" stroke="#4a3b2c" stroke-width="1.5" />
      <circle cx="20" cy="80" r="5" fill="COLOR_DARK" />
      <circle cx="35" cy="80" r="5" fill="COLOR_DARK" />
      <circle cx="65" cy="80" r="5" fill="COLOR_DARK" />
      <circle cx="80" cy="80" r="5" fill="COLOR_DARK" />
      <!-- Cab -->
      <polygon points="10,65 10,48 15,48 20,55 30,55 30,65" fill="url(#lightGrad)" stroke="#4a3b2c" stroke-width="1" />
      <polygon points="14,50 19,56 25,56" fill="#00e5ff" opacity="0.6" />
      <!-- Erector -->
      <rect x="30" y="60" width="50" height="5" fill="url(#darkGrad)" transform="rotate(-75 70 60)" />
      <!-- Missile -->
      <g transform="rotate(-75 70 60)">
        <rect x="35" y="46" width="45" height="14" rx="2" fill="url(#lightGrad)" stroke="#4a3b2c" stroke-width="1.5" />
        <rect x="55" y="46" width="6" height="14" fill="#00e5ff" />
        <polygon points="80,46 98,53 80,60" fill="url(#darkGrad)" />
        <polygon points="92,50 102,53 92,56" fill="#00e5ff" filter="url(#glow)" />
      </g>
      <!-- Smoke Deflector -->
      <polygon points="75,65 90,65 85,82" fill="#4a3b2c" />
    </g>
  
  </g>
</svg>