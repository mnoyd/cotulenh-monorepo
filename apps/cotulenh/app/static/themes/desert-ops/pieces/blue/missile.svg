<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)" />
    </filter>
  </defs>
  <!-- missile / blue High Detail Modern Warfare -->
  <g filter="url(#drop-shadow)">
    
    <g>
      <!-- TEL (Transporter Erector Launcher) Chassis -->
      <!-- Massive 8-Wheel Base -->
      <rect x="10" y="65" width="80" height="15" rx="3" fill="#d2b48c" stroke="#5c452b" stroke-width="1.5" />
      <!-- Tires -->
      <circle cx="20" cy="80" r="5" fill="#8b7355" stroke="#5c452b" stroke-width="1" />
      <circle cx="35" cy="80" r="5" fill="#8b7355" stroke="#5c452b" stroke-width="1" />
      <circle cx="65" cy="80" r="5" fill="#8b7355" stroke="#5c452b" stroke-width="1" />
      <circle cx="80" cy="80" r="5" fill="#8b7355" stroke="#5c452b" stroke-width="1" />
      
      <!-- Truck Cab (Forward) -->
      <polygon points="10,65 10,48 15,48 20,55 30,55 30,65" fill="#d2b48c" stroke="#5c452b" stroke-width="1.5" />
      <polygon points="14,50 19,56 25,56" fill="#5c452b" /> <!-- Window -->

      <!-- Erector Arm -->
      <rect x="30" y="60" width="50" height="4" fill="#8b7355" transform="rotate(-70 70 60)" />

      <!-- Massive Ballistic Missile (Erected) -->
      <g transform="rotate(-70 70 60)">
        <!-- Missile Body -->
        <rect x="35" y="48" width="45" height="12" rx="2" fill="#d2b48c" stroke="#5c452b" stroke-width="2" />
        <!-- Warning strip -->
        <rect x="55" y="48" width="5" height="12" fill="#e6c200" />
        <!-- Warhead Cone -->
        <polygon points="80,48 95,54 80,60" fill="#8b7355" />
        <polygon points="90,51 98,54 90,57" fill="#e6c200" /> <!-- Tip -->
        <!-- Tail Fins -->
        <polygon points="35,48 40,40 45,48" fill="#5c452b" />
        <polygon points="35,60 40,68 45,60" fill="#5c452b" />
      </g>
      
      <!-- Launch Exhaust Deflectors -->
      <polygon points="75,65 90,65 85,80" fill="#5c452b" />
    </g>
  
  </g>
</svg>