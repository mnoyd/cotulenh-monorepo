<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" />
    </filter>
  </defs>
  <ellipse cx="50" cy="85" rx="42" ry="8" fill="#1a1a1a" opacity="0.6" />
  <g filter="url(#shadow)">
    <!-- Silo / Base Platform -->
    <path d="M 35 75 L 65 75 L 70 85 L 30 85 Z" fill="#4a5d6e" stroke="#3d4a35" stroke-width="1.5" />
    <rect x="40" y="70" width="20" height="5" fill="#647b8f" />
    <!-- Missile Body (Jericho style) -->
    <!-- Pointing Straight Up -->
    <rect x="42" y="30" width="16" height="40" fill="#d4c0a5" stroke="#8b7a65" stroke-width="1.5" />
    <!-- Stages separation lines -->
    <rect x="42" y="55" width="16" height="2" fill="#8b7a65" />
    <rect x="42" y="45" width="16" height="2" fill="#8b7a65" />
    <!-- Warhead Tip -->
    <path d="M 42 30 L 50 10 L 58 30 Z" fill="#4a5d6e" stroke="#3d4a35" stroke-width="1.5" />
    <!-- Thruster / Flames -->
    <path d="M 44 70 L 50 82 L 56 70 Z" fill="#f39c12" />
    <path d="M 46 70 L 50 78 L 54 70 Z" fill="#fdf5e6" />
    <!-- Base clamps -->
    <path d="M 35 60 L 42 60 L 42 70 M 65 60 L 58 60 L 58 70" fill="none" stroke="#2c2a26" stroke-width="2" />
  </g>
</svg>