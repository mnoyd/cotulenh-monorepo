<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" />
    </filter>
  </defs>
  <ellipse cx="50" cy="85" rx="42" ry="8" fill="#1a1a1a" opacity="0.6" />
  <g filter="url(#shadow)">
    <!-- Base Platform -->
    <rect x="15" y="70" width="70" height="10" fill="#2a6d8a" stroke="#1a2520" stroke-width="1.5" rx="2" />
    <!-- Main Command Bunker -->
    <rect x="25" y="40" width="50" height="30" fill="#3b8cc4" stroke="#1a2520" stroke-width="1.5" rx="2" />
    <!-- Roof with Camo Netting Vibe -->
    <path d="M 22 40 L 78 40 L 70 30 L 30 30 Z" fill="#6aadcc" stroke="#2a6d8a" stroke-width="1.5" />
    <!-- Slanted Wall / Blast Deflector -->
    <path d="M 25 70 L 15 70 L 25 40 Z" fill="#2a6d8a" />
    <path d="M 75 70 L 85 70 L 75 40 Z" fill="#2a6d8a" />
    <!-- Door -->
    <rect x="42" y="55" width="16" height="15" fill="#2c2a26" />
    <rect x="54" y="62" width="2" height="4" fill="#6aadcc" /> <!-- Handle -->
    <!-- Window slots -->
    <rect x="30" y="50" width="8" height="4" fill="#2c2a26" />
    <rect x="62" y="50" width="8" height="4" fill="#2c2a26" />
    <!-- Antennas / Radar -->
    <rect x="32" y="15" width="2" height="15" fill="#2c2a26" />
    <ellipse cx="33" cy="18" rx="8" ry="4" fill="none" stroke="#2c2a26" stroke-width="1.5" />
    <rect x="65" y="10" width="2" height="20" fill="#2c2a26" />
    <!-- Flag / Pennant -->
    <path d="M 67 12 L 75 16 L 67 20 Z" fill="#3b8cc4" />
  </g>
</svg>