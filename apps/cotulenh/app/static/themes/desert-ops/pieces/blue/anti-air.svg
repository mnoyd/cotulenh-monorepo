<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)" />
    </filter>
  </defs>
  <!-- anti-air / blue High Detail Modern Warfare -->
  <g filter="url(#drop-shadow)">
    
    <g>
      <!-- Tracks (Boxier chassis) -->
      <path d="M 12 70 A 8 8 0 0 0 20 78 L 80 78 A 8 8 0 0 0 88 70 Z" fill="#8b7355" />
      <circle cx="20" cy="74" r="3" fill="#5c452b" />
      <circle cx="35" cy="74" r="3" fill="#5c452b" />
      <circle cx="50" cy="74" r="3" fill="#5c452b" />
      <circle cx="65" cy="74" r="3" fill="#5c452b" />
      <circle cx="80" cy="74" r="3" fill="#5c452b" />

      <!-- Hull -->
      <polygon points="10,50 15,45 80,45 90,55 90,70 10,70" fill="#d2b48c" stroke="#5c452b" stroke-width="1.5" />
      <rect x="15" y="48" width="10" height="5" fill="#8b7355" /> <!-- Driver viewport -->

      <!-- Anti-Air Turret Base -->
      <rect x="45" y="35" width="25" height="10" fill="#5c452b" />

      <!-- Missile Pod (Elevated) -->
      <g transform="rotate(-25 55 35)">
        <rect x="40" y="20" width="30" height="20" rx="3" fill="#8b7355" stroke="#d2b48c" stroke-width="2" />
        <!-- 4x Missile Tubes -->
        <circle cx="48" cy="25" r="3" fill="#5c452b" />
        <circle cx="62" cy="25" r="3" fill="#5c452b" />
        <circle cx="48" cy="35" r="3" fill="#5c452b" />
        <circle cx="62" cy="35" r="3" fill="#5c452b" />
        <!-- Missile tips extending -->
        <polygon points="68,23 74,25 68,27" fill="#e6c200" />
        <polygon points="68,33 74,35 68,37" fill="#e6c200" />
      </g>

      <!-- Advanced Radar Array (Spinning/Tilted) -->
      <path d="M 30 25 L 45 10 L 55 20 L 40 35 Z" fill="#d2b48c" stroke="#5c452b" stroke-width="1.5" />
      <circle cx="42" cy="22" r="5" fill="#e6c200" opacity="0.6" /> <!-- Radar pulse aesthetic -->
      <!-- Radar grid lines -->
      <line x1="35" y1="20" x2="50" y2="30" stroke="#5c452b" stroke-width="0.5" />
      <line x1="38" y1="17" x2="53" y2="27" stroke="#5c452b" stroke-width="0.5" />
    </g>
  
  </g>
</svg>