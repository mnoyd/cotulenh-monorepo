<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Rich Drop Shadow -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.5)" />
    </filter>
    <!-- Glowing Neon Accents -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Metallic/Gloss Gradients -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e6d2b5" />
      <stop offset="100%" stop-color="#c2a880" />
    </linearGradient>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#e6d2b5" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c2a880" />
      <stop offset="100%" stop-color="#8b7355" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.1" />
    </linearGradient>
    <radialGradient id="baseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#4a3b2c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a3b2c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- High-Tech Holographic Base -->
  
    <!-- High-tech projected base ring -->
    <ellipse cx="50" cy="88" rx="40" ry="8" fill="url(#baseGrad)" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.8" />
    <ellipse cx="50" cy="88" rx="36" ry="6" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.6" stroke-dasharray="4 2" />
    <circle cx="50" cy="88" r="2" fill="#00e5ff" />
  

  <!-- Premium anti-air / blue -->
  <g filter="url(#drop-shadow)">
    
    <g transform="translate(0,-5)">
      <!-- Chassis -->
      <path d="M 12 70 L 20 78 L 80 78 L 88 70 Z" fill="url(#darkGrad)" />
      <polygon points="10,50 15,45 80,45 90,55 90,70 10,70" fill="url(#mainGrad)" stroke="#4a3b2c" stroke-width="1.5" />
      <!-- Turret Base -->
      <rect x="42" y="38" width="20" height="7" fill="url(#darkGrad)" />
      <!-- Missile Pod -->
      <g transform="rotate(-30 52 38)">
        <rect x="35" y="20" width="35" height="20" rx="4" fill="url(#darkGrad)" stroke="url(#lightGrad)" stroke-width="1.5" />
        <!-- Missiles -->
        <circle cx="45" cy="26" r="3" fill="#4a3b2c" />
        <circle cx="60" cy="26" r="3" fill="#4a3b2c" />
        <circle cx="45" cy="34" r="3" fill="#4a3b2c" />
        <circle cx="60" cy="34" r="3" fill="#4a3b2c" />
        <polygon points="68,24 76,26 68,28" fill="#00e5ff" filter="url(#glow)" />
        <polygon points="68,32 76,34 68,36" fill="#00e5ff" filter="url(#glow)" />
      </g>
      <!-- Radar -->
      <path d="M 28 25 L 45 10 L 55 20 L 38 35 Z" fill="url(#lightGrad)" stroke="#4a3b2c" stroke-width="1" />
      <circle cx="42" cy="22" r="6" fill="#00e5ff" filter="url(#glow)" opacity="0.8" />
    </g>
  
  </g>
</svg>